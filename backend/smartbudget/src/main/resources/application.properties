spring.application.name=smartbudget

# server
server.port=8080

# 파일 업로드 설정
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# datasource (PostgreSQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# mybatis
mybatis.mapper-locations=classpath:/mappers/**/*.xml
mybatis.type-aliases-package=com.smartbudget
mybatis.type-handlers-package=com.smartbudget.config

# mybatis.configuration.map-underscore-to-camel-case=true
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# Gemini API
gemini.api.key=${GEMINI_API_KEY}

# Google Custom Search (카드 혜택 웹 검색용, 선택)
google.customsearch.api.key=${GOOGLE_CUSTOM_SEARCH_API_KEY:}
google.customsearch.cx=${GOOGLE_CUSTOM_SEARCH_CX:}

# JWT
jwt.secret=${JWT_SECRET:smartbudget-secret-key-for-jwt-token-generation-minimum-256-bits}
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=604800000

# Python ML Server (기존 ml-server)
# Windows에서 localhost가 IPv6(::1)로 해석되면 연결 실패가 날 수 있어 127.0.0.1 기본값 사용
ml.server.url=${ML_SERVER_URL:http://127.0.0.1:8000}
ml.server.timeout=30000

# OCR Receipts Server
# 통합 실행(run_all.py) 기준: ml-server(8000)에 OCR_receipts를 /receipts로 마운트해서 사용
ocr.receipts.server.url=${OCR_RECEIPTS_SERVER_URL:http://127.0.0.1:8000/receipts}
ocr.receipts.server.timeout=60000

# Recommendation AI (카드 추천). 통합 실행 시 ml-server에 마운트되므로 /recommendation 사용
recommendation.ai.server.url=${RECOMMENDATION_AI_SERVER_URL:http://127.0.0.1:8000/recommendation}
recommendation.ai.enabled=${RECOMMENDATION_AI_ENABLED:true}

# OCR/Classification Engine: "python" or "gemini"
ocr.engine=${OCR_ENGINE:python}
ml.classifier.engine=${ML_CLASSIFIER_ENGINE:python}

# 공공데이터포털(금융공공데이터) 오픈 API 키 - 금융상품(예금/적금) 조회 시 사용
# 발급: https://www.data.go.kr → 활용신청 → 인증키 발급 (한국산업은행 예금상품 정보 등)
app.finance.api.key=${DATA_GO_KR_API_KEY:}
# true: .env에 넣은 키를 URL 인코딩 없이 그대로 전송 (포털 '인코딩된 인증키' 복사본용)
# false(기본): 일반인증키(비인코딩)로 간주하고 한 번만 인코딩해서 전송
app.finance.api.key.encoded=${DATA_GO_KR_API_KEY_ENCODED:false}

# 신한카드 JSON 경로 (선택) - 미설정 시 classpath:data/shinhancard_cards.json, data/shinhancard_check_cards.json 사용
# 파일 경로 예: ../../shinhancard_cards.json (프로젝트 루트 기준)
# app.shinhan.cards.credit-path=
# app.shinhan.cards.check-path=

# =========================
# OAuth2 - Kakao
# =========================

# 카카오 REST API 키(클라이언트 ID) 입력
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID}

# 카카오 Client Secret 사용 시 입력
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET}

spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email,profile_image
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# =========================
# OAuth2 성공 후 프론트로 보낼 URL
# - 로그인 완료 후 accessToken/refreshToken을 query로 붙여 redirect 합니다.
# - .env에서 APP_OAUTH2_REDIRECT_URI 로 변경 가능 (예: http://192.168.0.8:5173/login)
# =========================
# 프론트 로그인 페이지 URL (환경변수로 오버라이드 가능)
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI:http://localhost:5173/login}
app.oauth2.frontend-port=${APP_OAUTH2_FRONTEND_PORT:5173}
app.oauth2.allowed-hosts=${APP_OAUTH2_ALLOWED_HOSTS:localhost,127.0.0.1,192.168.0.25,192.168.0.8,192.168.0.15,15.164.211.42}

# RAG (리포트 Q&A)
rag.enabled=${RAG_ENABLED:false}
rag.top-k=${RAG_TOP_K:5}
rag.embedding.model=${RAG_EMBEDDING_MODEL:text-embedding-004}

# =========================
# AWS S3 (영수증 이미지)
# =========================
aws.s3.enabled=${AWS_S3_ENABLED:false}
aws.s3.bucket=${AWS_S3_BUCKET:smartbudget-receipts-eastsea979797}
aws.region=${AWS_REGION:ap-northeast-2}
