services:
  backend:
    build:
      context: ./backend/smartbudget
      dockerfile: Dockerfile
    env_file:
      - ./backend/smartbudget/.env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      APP_OAUTH2_REDIRECT_URI: http://15.164.211.42/login
      APP_OAUTH2_FRONTEND_PORT: 80
      APP_OAUTH2_ALLOWED_HOSTS: 15.164.211.42,localhost,127.0.0.1

      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "5"
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "15"
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: "3000"
      SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT: "1000"
      SPRING_DATASOURCE_HIKARI_KEEPALIVE_TIME: "300000"
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: "1500000"
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m -XX:+UseG1GC"

      ML_SERVER_URL: http://ml:8000
      RECOMMENDATION_AI_SERVER_URL: http://ml:8000/recommendation
      OCR_RECEIPTS_SERVER_URL: http://ml:8000/receipts

    restart: unless-stopped
    networks:
      - appnet
    expose:
      - "8080"
    cpus: "1.00"

  ml:
    build:
      context: ./AI-service
      dockerfile: Dockerfile
    env_file:
      - ./AI-service/.env
    environment:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      TORCH_NUM_THREADS: "1"
      OCR_PORT: "8000"
    restart: unless-stopped
    networks:
      - appnet
    expose:
      - "8000" 
    cpus: "0.70"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
      - ml
    restart: unless-stopped
    networks:
      - appnet
    ports:
      - "80:80"

networks:
  appnet:
    driver: bridge
