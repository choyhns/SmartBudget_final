
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBudget - AI 개인 금융 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #020617;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }
        /* 카드 이미지 슬라이드 배너 (추천 페이지) */
        @keyframes recommend-marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-recommend-marquee {
            animation: recommend-marquee 45s linear infinite;
        }
        /* 카드 로딩 로더: 2번 참고 - 가운데 밝게, 돋보기 효과 세밀·뚜렷하게 */
        .loader {
            --main-size: 4em;
            --text-color: #ffffff;
            --bright: #ffffff;
            --shadow-color: #2d2d2d;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: visible;
            user-select: none;
            position: relative;
            font-size: var(--main-size);
            font-weight: 900;
            text-transform: uppercase;
            color: var(--text-color);
            width: 7.3em;
            min-height: 1.65em;
        }
        .loader .text {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1em;
        }
        /* 돋보기: 가운데 5군데만 적용, 양끝으로 갈수록 약해짐. 1·2·8·9는 한 덩어리로 흐리게 */
        .loader .text:nth-child(1) {
            clip-path: polygon(0% 0%, 11.11% 0%, 11.11% 100%, 0% 100%);
            font-size: calc(var(--main-size) / 38);
            margin-left: -2.1em;
            opacity: 0.06;
        }
        .loader .text:nth-child(2) {
            clip-path: polygon(11.11% 0%, 22.22% 0%, 22.22% 100%, 11.11% 100%);
            font-size: calc(var(--main-size) / 38);
            margin-left: -0.98em;
            opacity: 0.06;
        }
        /* 5군데 중 1번째 (왼쪽 끝 쪽) - 약함 */
        .loader .text:nth-child(3) {
            clip-path: polygon(22.22% 0%, 33.33% 0%, 33.33% 100%, 22.22% 100%);
            font-size: calc(var(--main-size) / 12);
            margin-left: -0.33em;
            opacity: 0.42;
        }
        /* 5군데 중 2번째 */
        .loader .text:nth-child(4) {
            clip-path: polygon(33.33% 0%, 44.44% 0%, 44.44% 100%, 33.33% 100%);
            font-size: calc(var(--main-size) / 8);
            margin-left: -0.05em;
            opacity: 0.78;
        }
        /* 5군데 중 3번째 (정중앙) - 최대 */
        .loader .text:nth-child(5) {
            clip-path: polygon(44.44% 0%, 55.55% 0%, 55.55% 100%, 44.44% 100%);
            font-size: calc(var(--main-size) / 5.6);
            margin-left: 0em;
            opacity: 1;
            filter: drop-shadow(0 0 0.02em rgba(255,255,255,0.95));
        }
        /* 5군데 중 4번째 */
        .loader .text:nth-child(6) {
            clip-path: polygon(55.55% 0%, 66.66% 0%, 66.66% 100%, 55.55% 100%);
            font-size: calc(var(--main-size) / 8);
            margin-left: 0.05em;
            opacity: 0.78;
        }
        /* 5군데 중 5번째 (오른쪽 끝 쪽) - 약함 */
        .loader .text:nth-child(7) {
            clip-path: polygon(66.66% 0%, 77.77% 0%, 77.77% 100%, 66.66% 100%);
            font-size: calc(var(--main-size) / 12);
            margin-left: 0.33em;
            opacity: 0.42;
        }
        .loader .text:nth-child(8) {
            clip-path: polygon(77.77% 0%, 88.88% 0%, 88.88% 100%, 77.77% 100%);
            font-size: calc(var(--main-size) / 38);
            margin-left: 0.98em;
            opacity: 0.06;
        }
        .loader .text:nth-child(9) {
            clip-path: polygon(88.88% 0%, 100% 0%, 100% 100%, 88.88% 100%);
            font-size: calc(var(--main-size) / 38);
            margin-left: 2.1em;
            opacity: 0.06;
        }
        .loader .text span {
            animation: loader-scrolling 2.2s cubic-bezier(0.15, 0.5, 0.85, 0.5) infinite,
                       loader-shadow 2.2s cubic-bezier(0.15, 0.5, 0.85, 0.5) infinite;
        }
        /* 양끝: 어두운 그라데이션 (웨이브용) */
        .loader .text:nth-child(1) span,
        .loader .text:nth-child(2) span,
        .loader .text:nth-child(3) span {
            background: linear-gradient(90deg, var(--shadow-color) 0%, var(--bright) 12%, var(--shadow-color) 24%);
            background-size: 320% 100%;
            background-clip: text;
            color: transparent;
        }
        /* 가운데 쪽: 밝은 비중 크게 (돋보기 밝기 확보) */
        .loader .text:nth-child(4) span {
            background: linear-gradient(90deg, var(--bright) 0%, var(--bright) 25%, var(--shadow-color) 32%, var(--bright) 39%, var(--bright) 100%);
            background-size: 320% 100%;
            background-clip: text;
            color: transparent;
        }
        .loader .text:nth-child(5) span {
            background: linear-gradient(90deg, var(--bright) 0%, var(--bright) 30%, var(--shadow-color) 38%, var(--bright) 46%, var(--bright) 100%);
            background-size: 320% 100%;
            background-clip: text;
            color: transparent;
        }
        .loader .text:nth-child(6) span {
            background: linear-gradient(90deg, var(--bright) 0%, var(--bright) 25%, var(--shadow-color) 32%, var(--bright) 39%, var(--bright) 100%);
            background-size: 320% 100%;
            background-clip: text;
            color: transparent;
        }
        .loader .text:nth-child(7) span,
        .loader .text:nth-child(8) span,
        .loader .text:nth-child(9) span {
            background: linear-gradient(90deg, var(--shadow-color) 0%, var(--bright) 12%, var(--shadow-color) 24%);
            background-size: 320% 100%;
            background-clip: text;
            color: transparent;
        }
        .loader .line {
            position: absolute;
            top: 1.12em;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            height: 0.05em;
            width: calc(var(--main-size) / 2);
            border-radius: 0;
        }
        .loader .line::before {
            content: "";
            position: absolute;
            height: 100%;
            width: 100%;
            background-color: var(--text-color);
            opacity: 0.3;
        }
        .loader .line::after {
            content: "";
            position: absolute;
            height: 100%;
            width: 100%;
            background-color: var(--text-color);
            border-radius: 0;
            transform: translateX(-90%);
            animation: loader-wobble 2s cubic-bezier(0.5, 0.8, 0.5, 0.2) infinite;
        }
        @keyframes loader-wobble {
            0% { transform: translateX(-90%); }
            50% { transform: translateX(90%); }
            100% { transform: translateX(-90%); }
        }
        @keyframes loader-scrolling {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        @keyframes loader-shadow {
            0% { background-position: 0% 0; }
            100% { background-position: 100% 0; }
        }
        /* 3D 회전 카드 캐러셀 */
        .carousel-3d-wrapper {
            width: 100%;
            min-height: 460px;
            position: relative;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        .carousel-3d-inner {
            --w: 156px;
            --h: 234px;
            --translateZ: calc((var(--w) + var(--h)) - 130px);
            --rotateX: -15deg;
            --perspective: 1000px;
            position: absolute;
            width: var(--w);
            height: var(--h);
            top: 50%;
            left: 50%;
            margin-left: calc(-1 * (var(--w) / 2));
            margin-top: calc(-1 * (var(--h) / 2));
            z-index: 2;
            transform-style: preserve-3d;
            transform: perspective(var(--perspective));
            animation: carousel-3d-rotating 20s linear infinite;
        }
        .carousel-3d-wrapper:hover .carousel-3d-inner {
            animation-play-state: paused;
        }
        .carousel-3d-inner-js {
            animation: none !important;
        }
        @keyframes carousel-3d-rotating {
            from {
                transform: perspective(var(--perspective)) rotateX(var(--rotateX)) rotateY(0);
            }
            to {
                transform: perspective(var(--perspective)) rotateX(var(--rotateX)) rotateY(1turn);
            }
        }
        .carousel-3d-card {
            position: absolute;
            overflow: visible;
            inset: 0;
            transform: rotateY(calc((360deg / var(--quantity, 10)) * var(--index))) translateZ(var(--translateZ));
            cursor: pointer;
            border: none;
            outline: none;
            box-shadow: none;
        }
        .carousel-3d-card .carousel-3d-img {
            overflow: hidden;
        }
        .carousel-3d-img {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            overflow: hidden;
            border: none;
            outline: none;
        }
        /* 가져온 카드 이미지(가로형)를 세로 슬롯에 맞게 90도 회전, 위아래 잘림 없이 전체 노출 */
        .carousel-3d-img img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center center;
            transform: rotate(90deg);
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",

</script>
</head>
